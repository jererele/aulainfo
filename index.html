<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AulaInfo — Registro de Ausencias</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#020202">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="assets/icon.png">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">


  <link rel="stylesheet" href="styles.css">
</head>
<body id="cosmos-target">
  <canvas id="cosmos-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
  <div id="toast-container" class="toast-container"></div>



<!-- LOGIN -->

<div id="login-screen">

  <div class="login-box">

    <div class="login-logo">Aula<span>Info</span></div>

    <div class="login-sub">Sistema de registro de ausencias · Instituto San Martín</div>

    <label class="login-label">Ingresás como</label>

    <div class="role-grid">

      <div class="role-btn active" onclick="selectRole('directivo',this)">

        <span class="role-icon">🏛️</span><span class="role-name">Directivo</span>

      </div>

      <div class="role-btn" onclick="selectRole('preceptor',this)">

        <span class="role-icon">📋</span><span class="role-name">Preceptor</span>

      </div>

      <div class="role-btn" onclick="selectRole('profesor',this)">

        <span class="role-icon">🧑‍🏫</span><span class="role-name">Profesor</span>

      </div>

      <div class="role-btn" onclick="selectRole('alumno',this)">

        <span class="role-icon">🎒</span><span class="role-name">Alumno</span>

      </div>

    </div>

    <label class="login-label">Usuario</label>

    <input class="login-input" id="login-user" type="text" placeholder="usuario@institutosm.edu.ar">

    <label class="login-label">Contraseña</label>

    <input class="login-input" type="password" placeholder="••••••••">

    <button class="btn-login" onclick="doLogin()">Ingresar →</button>

  </div>

</div>



<!-- APP -->

<div id="app">

  <div class="topbar">

    <div class="topbar-logo">Aula<span>Info</span></div>

    <div class="topbar-right">

      <span class="user-name" id="topbar-user"></span>

      <span class="role-badge" id="topbar-badge"></span>
      <div class="lang-switcher" onclick="toggleLang()" id="lang-btn">
        <span class="lang-flag">🇦🇷</span> <span class="lang-name">ES</span>
      </div>
      <button class="btn-logout" onclick="logout()">Salir</button>

    </div>

  </div>

  <div class="main-layout">

    <nav class="sidebar" id="sidebar"></nav>

    <main class="content" id="content-area"></main>

  </div>

</div>



<!-- MODAL NUEVA AUSENCIA (Profesor) -->

<div class="modal-overlay" id="modal-ausencia">

  <div class="modal">

    <div class="modal-header">

      <div class="modal-title">Registrar ausencia / licencia</div>

      <button class="modal-close" onclick="closeModal('modal-ausencia')">✕</button>

    </div>

    <div class="form-group">

      <label class="form-label">Tipo</label>

      <select class="form-select" id="tipo-ausencia">

        <option value="ausencia">Ausencia del día</option>

        <option value="licencia-medica">Licencia médica</option>

        <option value="licencia-personal">Licencia personal</option>

        <option value="capacitacion">Capacitación / Jornada</option>

        <option value="otro">Otro</option>

      </select>

    </div>

    <div class="form-row">

      <div class="form-group">

        <label class="form-label">Fecha inicio</label>

        <input class="form-input" type="date" id="fecha-inicio">

      </div>

      <div class="form-group">

        <label class="form-label">Fecha fin</label>

        <input class="form-input" type="date" id="fecha-fin">

      </div>

    </div>

    <div class="form-group">

      <label class="form-label">Materias y cursos afectados</label>

      <div id="materias-check" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0.8rem"></div>

    </div>

    <div class="form-group">

      <label class="form-label">Descripción / Motivo</label>

      <textarea class="form-textarea" id="motivo-texto" placeholder="Describí brevemente el motivo..."></textarea>

    </div>

    <div class="form-group">

      <label class="form-label">Certificado o justificación (opcional)</label>

      <label class="upload-area" for="file-cert">

        <div class="upload-icon">📎</div>

        <p>Hacé clic para adjuntar o arrastrá el archivo aquí</p>

        <p style="font-size:0.75rem;color:var(--text3);margin-top:0.2rem">PDF, JPG, PNG — máx. 5MB</p>

        <input type="file" id="file-cert" accept=".pdf,.jpg,.jpeg,.png" onchange="showFileName(this)">

      </label>

      <div id="file-name" style="font-size:0.8rem;color:var(--verde);margin-top:0.4rem;display:none"></div>

    </div>

    <div class="form-actions">

      <button class="btn btn-outline" onclick="closeModal('modal-ausencia')">Cancelar</button>

      <button class="btn btn-primary" onclick="submitAusencia()">Registrar ausencia</button>

    </div>

  </div>

</div>



<!-- MODAL DETALLE AUSENCIA -->

<div class="modal-overlay" id="modal-detalle">

  <div class="modal">

    <div class="modal-header">

      <div class="modal-title">Detalle de ausencia</div>

      <button class="modal-close" onclick="closeModal('modal-detalle')">✕</button>

    </div>

    <div id="detalle-content"></div>

    <div class="form-actions" id="detalle-actions"></div>

  </div>

</div>
<!-- MODAL LOGROS -->
<div class="modal-overlay" id="modal-logros">
  <div class="modal" style="max-width: 400px; text-align: center">
    <div class="achievement-icon" style="font-size: 4rem; margin-bottom: 1rem">🏆</div>
    <div class="modal-title" id="logro-titulo">¡Nuevo Logro!</div>
    <p id="logro-desc" style="color: var(--text2); margin: 1rem 0 2rem"></p>
    <button class="btn btn-primary" onclick="closeModal('modal-logros')" style="width: 100%">¡Genial!</button>
  </div>
</div>

<!-- COMMAND PALETTE -->
<div class="modal-overlay" id="modal-command" style="align-items: flex-start; padding-top: 10vh; background: rgba(0,0,0,0.8)">
  <div class="command-palette">
    <div class="command-header">
      <span style="font-size: 1.2rem">🔍</span>
      <input type="text" id="command-input" placeholder="Buscar comando, profesor o sección... (Esc)" oninput="searchCommands(this.value)">
    </div>
    <div class="command-results" id="command-results"></div>
    <div class="command-footer">
      <span><b>ENTER</b> seleccionar</span>
      <span><b>ESC</b> cerrar</span>
    </div>
  </div>
</div>

  <script src="app.js"></script>
  <script src="cosmos.js"></script>
</body>
</html>
