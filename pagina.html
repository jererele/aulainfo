<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AulaInfo — Registro de Ausencias</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

  --bg:#020202; /* Negro profundo */

  --bg2:rgba(15, 15, 18, 0.55); /* Glass transparente */

  --bg3:rgba(25, 25, 30, 0.65);

  --bg4:rgba(35, 35, 45, 0.7);

  --border:rgba(255, 255, 255, 0.08);

  --border2:rgba(255, 255, 255, 0.15);

  --border-glow:rgba(255, 255, 255, 0.1);

  --text:#F3F4F6;

  --text2:#9CA3AF;

  --text3:#6B7280;

  

  /* Acentos vibrantes neon */

  --verde:#10B981;

  --verde-dim:#059669;

  --verde-bg:rgba(16, 185, 129, 0.12);

  --verde-border:rgba(16, 185, 129, 0.3);

  

  --rojo:#EF4444;

  --rojo-dim:#DC2626;

  --rojo-bg:rgba(239, 68, 68, 0.12);

  --rojo-border:rgba(239, 68, 68, 0.3);

  

  --amarillo:#F59E0B;

  --amarillo-bg:rgba(245, 158, 11, 0.12);

  --amarillo-border:rgba(245, 158, 11, 0.3);

  

  --azul:#3B82F6;

  --azul-bg:rgba(59, 130, 246, 0.12);

  --azul-border:rgba(59, 130, 246, 0.3);

  

  --violeta:#8B5CF6;

  --violeta-bg:rgba(139, 92, 246, 0.12);

  --violeta-border:rgba(139, 92, 246, 0.3);

  

  --cyan:#06B6D4;

  --cyan-bg:rgba(6, 182, 212, 0.12);

  --cyan-border:rgba(6, 182, 212, 0.3);

  

  --radius:12px;

  --radius-lg:20px;

  --font-title:'Outfit',sans-serif;

  --font-text:'Inter',sans-serif;

  --mono:'JetBrains Mono',monospace;

}



html{scroll-behavior:smooth}

body{

  font-family:var(--font-text);

  background:var(--bg);

  color:var(--text);

  min-height:100vh;

  font-size:15px;

  line-height:1.5;

  position: relative;

}



/* EFECTO INTERACTIVO DE FONDO MOUSE */

body::before {

  content: '';

  position: fixed;

  top: 0; left: 0; right: 0; bottom: 0;

  background: radial-gradient(circle 900px at var(--mouse-x, 50vw) var(--mouse-y, 50vh), rgba(16, 185, 129, 0.1), transparent 85%);

  pointer-events: none;

  z-index: 0;

  transition: background 0.15s ease-out;

}



/* Efecto Malla sutil en el fondo */

body::after {

  content: '';

  position: fixed;

  inset: 0;

  background-image: 

    linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),

    linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);

  background-size: 40px 40px;

  pointer-events: none;

  z-index: 0;

  opacity: 0.3;

}



/* Títulos con tipografía principal y animaciones */

h1, h2, h3, .page-title, .modal-title, .login-logo, .card-title, .stat-num {

  font-family:var(--font-title);

}



/* LOGIN */

#login-screen{

  min-height:100vh;display:flex;align-items:center;justify-content:center;

  position:relative;overflow:hidden;

  z-index: 10;

}

.login-box{

  background:var(--bg2);

  backdrop-filter:blur(25px);

  -webkit-backdrop-filter:blur(25px);

  border:1px solid var(--border);

  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.7), inset 0 1px 1px rgba(255,255,255,0.05);

  border-radius:var(--radius-lg);

  padding:3rem 2.5rem;width:420px;max-width:95vw;

  position:relative;z-index:1;

  animation: floatUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);

}

@keyframes floatUp {

  0% { transform: translateY(30px); opacity: 0; }

  100% { transform: translateY(0); opacity: 1; }

}



.login-logo{

  font-size:2rem;font-weight:800;letter-spacing:-1px;

  color:var(--text);margin-bottom:0.3rem;

}

.login-logo span{

  color:var(--verde);

  text-shadow: 0 0 20px rgba(16,185,129,0.4);

}

.login-sub{font-size:0.9rem;color:var(--text2);margin-bottom:2.5rem; font-weight:400;}



.login-label{font-size:0.75rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem;display:block}

.login-input{

  width:100%;

  background:var(--bg3);

  border:1px solid var(--border);

  border-radius:var(--radius);

  padding:0.8rem 1rem;

  font-family:var(--font-text);

  font-size:0.95rem;color:var(--text);

  outline:none;transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

  margin-bottom:1.5rem;

}

.login-input:focus{

  border-color:var(--verde);

  background: rgba(16, 185, 129, 0.03);

  box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);

}

.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;margin-bottom:2rem}

.role-btn{

  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);

  padding:0.8rem;text-align:center;cursor:pointer;

  transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

}

.role-btn:hover{

  border-color:var(--verde-border);

  transform: translateY(-2px);

}

.role-btn.active{

  border-color:var(--verde);

  background:var(--verde-bg);

  box-shadow: 0 4px 20px -5px rgba(16,185,129,0.3);

}

.role-btn .role-icon{font-size:1.5rem;display:block;margin-bottom:0.4rem; transition:transform 0.3s;}

.role-btn:hover .role-icon{transform:scale(1.1);}

.role-btn .role-name{font-size:0.82rem;font-weight:600;color:var(--text2)}

.role-btn.active .role-name{color:var(--verde)}



.btn-login{

  width:100%;background:var(--verde);

  background: linear-gradient(135deg, var(--verde) 0%, var(--verde-dim) 100%);

  border:none;border-radius:var(--radius);

  padding:0.9rem;font-family:var(--font-text);font-size:1.05rem;font-weight:600;color:#000;

  cursor:pointer;

  transition:all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

  box-shadow: 0 8px 20px -6px rgba(16,185,129,0.5);

}

.btn-login:hover{

  transform:translateY(-2px);

  box-shadow: 0 12px 25px -6px rgba(16,185,129,0.6);

}



/* LAYOUT GENERAL */

#app{display:none;min-height:100vh;flex-direction:column; position:relative; z-index:10;}



.topbar{

  background:var(--bg2);

  backdrop-filter:blur(20px);

  -webkit-backdrop-filter:blur(20px);

  border-bottom:1px solid var(--border);

  padding:0 1.5rem;height:65px;display:flex;align-items:center;justify-content:space-between;

  position:sticky;top:0;z-index:50;

}

.topbar-logo{font-family:var(--font-title);font-size:1.3rem;font-weight:800;letter-spacing:-0.5px}

.topbar-logo span{color:var(--verde); text-shadow: 0 0 15px rgba(16,185,129,0.4);}

.topbar-right{display:flex;align-items:center;gap:1.2rem}



.role-badge{

  font-size:0.75rem;font-weight:600;padding:0.35rem 0.8rem;border-radius:100px;

  text-transform:uppercase;letter-spacing:0.8px;

}

.badge-directivo{background:var(--violeta-bg);color:var(--violeta);border:1px solid var(--violeta-border)}

.badge-preceptor{background:var(--azul-bg);color:var(--azul);border:1px solid var(--azul-border)}

.badge-profesor{background:var(--verde-bg);color:var(--verde);border:1px solid var(--verde-border)}

.badge-alumno{background:var(--cyan-bg);color:var(--cyan);border:1px solid var(--cyan-border)}



.btn-logout{

  background:transparent;border:1px solid var(--border);border-radius:var(--radius);

  padding:0.4rem 1rem;font-family:var(--font-text);font-size:0.85rem;color:var(--text2);

  cursor:pointer;transition:all 0.2s;font-weight:500;

}

.btn-logout:hover{border-color:var(--rojo);color:var(--rojo); background:var(--rojo-bg);}

.user-name{font-size:0.9rem;font-weight:500;color:var(--text)}



.main-layout{display:flex;flex:1}

.sidebar{

  width:250px;

  background:var(--bg2);

  backdrop-filter:blur(20px);

  -webkit-backdrop-filter:blur(20px);

  border-right:1px solid var(--border);

  padding:1.5rem 1rem;display:flex;flex-direction:column;gap:0.4rem;

  position:sticky;top:65px;height:calc(100vh - 65px);overflow-y:auto;

}

.nav-item{

  display:flex;align-items:center;gap:0.8rem;

  padding:0.75rem 1rem;border-radius:var(--radius);cursor:pointer;

  font-size:0.92rem;font-weight:500;color:var(--text2);

  transition:all 0.2s ease;border:1px solid transparent;

  position:relative;

  overflow:hidden;

}

.nav-item:hover{

  background:var(--bg3);color:var(--text);

  transform: translateX(4px);

}

.nav-item.active{

  background:var(--verde-bg);color:var(--verde);border-color:var(--verde-border);

}

.nav-item .nav-icon{font-size:1.1rem;width:24px;text-align:center;}

.nav-section{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--text3);padding:1rem 1rem 0.5rem}



.content{flex:1;padding:2.5rem;overflow-y:auto;max-width:1200px; margin:0 auto; width:100%;animation: fadeIn 0.4s ease;}

@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }

.page{display:none}

.page.active{display:block; animation: enterPage 0.4s ease-out;}

@keyframes enterPage {

  0% { opacity: 0; transform: scale(0.98); }

  100% { opacity: 1; transform: scale(1); }

}



/* TÃTULOS */

.page-title{font-size:1.8rem;font-weight:700;letter-spacing:-0.5px;margin-bottom:0.4rem;text-shadow:0 2px 10px rgba(0,0,0,0.5);}

.page-sub{font-size:0.95rem;color:var(--text2);margin-bottom:2rem}



/* STATS CARDS */

.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem;margin-bottom:2.5rem}

.stat-card{

  background:var(--bg2);

  backdrop-filter:blur(15px);

  border:1px solid var(--border);border-radius:var(--radius-lg);

  padding:1.5rem;

  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);

  transition:all 0.3s ease;

}

.stat-card:hover{

  transform:translateY(-4px);

  border-color:var(--border2);

  box-shadow: 0 10px 30px -10px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.08);

}

.stat-num{font-size:2.2rem;font-weight:700;line-height:1}

.stat-label{font-size:0.85rem;color:var(--text2);margin-top:0.5rem;font-weight:500;}

.stat-change{font-size:0.8rem;margin-top:0.6rem; font-weight:500;}

.stat-up{color:var(--rojo)}

.stat-down{color:var(--verde)}



/* TABLAS Y TARJETAS */

.card{

  background:var(--bg2);

  backdrop-filter:blur(15px);

  border:1px solid var(--border);border-radius:var(--radius-lg);

  overflow:hidden;

  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);

}

.card-header{

  padding:1.2rem 1.5rem;border-bottom:1px solid var(--border);

  display:flex;align-items:center;justify-content:space-between;

  background:rgba(255,255,255,0.02);

}

.card-title{font-family:var(--font-title);font-size:1.1rem;font-weight:600}

.card-actions{display:flex;gap:0.8rem;align-items:center}

.filter-select{

  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);

  padding:0.4rem 0.8rem;font-family:var(--font-text);font-size:0.85rem;color:var(--text);

  outline:none;cursor:pointer;transition:all 0.2s;

}

.filter-select:hover{border-color:var(--border2)}

.search-input{

  background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);

  padding:0.4rem 1rem;font-family:var(--font-text);font-size:0.85rem;color:var(--text);

  outline:none;width:220px;transition:all 0.3s;

}

.search-input:focus{

  border-color:var(--verde);

  box-shadow: 0 0 0 3px rgba(16,185,129,0.15);

  width:240px;

}

.search-input::placeholder{color:var(--text3)}



table{width:100%;border-collapse:collapse}

thead tr{background:rgba(255,255,255,0.03)}

th{

  padding:1rem 1.5rem;text-align:left;font-size:0.75rem;font-weight:600;

  text-transform:uppercase;letter-spacing:1px;color:var(--text2);

  border-bottom:1px solid var(--border);

}

td{

  padding:1rem 1.5rem;font-size:0.92rem;border-bottom:1px solid var(--border);

  vertical-align:middle;

}

tr:last-child td{border-bottom:none}

tr{transition:background 0.2s;}

tr:hover td{background:rgba(255,255,255,0.03)}



.chip{

  display:inline-flex;align-items:center;gap:6px;

  font-size:0.75rem;font-weight:600;padding:0.25rem 0.8rem;border-radius:100px;

}

.chip-verde{background:var(--verde-bg);color:var(--verde);border:1px solid var(--verde-border)}

.chip-rojo{background:var(--rojo-bg);color:var(--rojo);border:1px solid var(--rojo-border)}

.chip-amarillo{background:var(--amarillo-bg);color:var(--amarillo);border:1px solid var(--amarillo-border)}

.chip-azul{background:var(--azul-bg);color:var(--azul);border:1px solid var(--azul-border)}

.chip-gris{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}



.dot{width:8px;height:8px;border-radius:50%;display:inline-block;box-shadow:0 0 8px currentColor;}

.dot-verde{background:var(--verde);color:var(--verde)}

.dot-rojo{background:var(--rojo);color:var(--rojo)}

.dot-amarillo{background:var(--amarillo);color:var(--amarillo)}



.btn{

  display:inline-flex;align-items:center;gap:8px;

  padding:0.6rem 1.25rem;border-radius:var(--radius);font-family:var(--font-text);

  font-size:0.9rem;font-weight:600;cursor:pointer;border:none;transition:all 0.2s;

}

.btn:active{transform:scale(0.97);}

.btn-primary{

  background: linear-gradient(135deg, var(--verde) 0%, var(--verde-dim) 100%);

  color:#000;

  box-shadow: 0 4px 15px -4px rgba(16,185,129,0.4);

}

.btn-primary:hover{

  box-shadow: 0 6px 20px -4px rgba(16,185,129,0.6);

  transform:translateY(-1px);

}

.btn-outline{background:var(--bg3);border:1px solid var(--border);color:var(--text)}

.btn-outline:hover{border-color:var(--border2);background:var(--bg4)}

.btn-danger{background:var(--rojo-bg);border:1px solid var(--rojo-border);color:var(--rojo)}

.btn-danger:hover{background:rgba(239,68,68,0.2);box-shadow:0 0 15px rgba(239,68,68,0.2)}

.btn-sm{padding:0.4rem 0.9rem;font-size:0.8rem}



/* TABLA HORARIO EXACTA */

.horario-table {

  width: 100%; border-collapse: separate; border-spacing: 1px;

  background: var(--border2);

  border-radius: var(--radius-lg); overflow: hidden;

  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);

}

.horario-table th, .horario-table td {

  background: var(--bg2); padding: 0.6rem; text-align: center;

  backdrop-filter: blur(5px); vertical-align: middle;

  border-bottom: 1px solid var(--border);

  border-right: 1px solid var(--border);

}

.horario-table th:last-child, .horario-table td:last-child { border-right: none; }

.horario-table tr:last-child td { border-bottom: none; }

.horario-table th {

  font-family: var(--font-title); font-weight: 700; color: var(--text2);

  letter-spacing: 1px; font-size: 0.8rem; background: rgba(255,255,255,0.05);

  text-transform: uppercase;

}

.horario-table .hs-col {

  font-family: var(--mono); font-size: 0.75rem; color: var(--text3);

  font-weight: 600; width: 100px;

}

.horario-table .recreo-row td {

  background: var(--bg3); font-weight: 700; color: var(--text2);

  letter-spacing: 4px; padding: 0.4rem; font-size: 0.8rem;

}

.horario-table .clase-cell {

  display: flex; flex-direction: column; align-items: center; justify-content: center;

  height: 100%; gap: 4px; transition: all 0.2s;

}

.horario-table td:hover .clase-cell:not(.ausente) {

  transform: scale(1.03); text-shadow: 0 0 8px rgba(255,255,255,0.2);

}

.horario-table .materia { font-weight: 600; font-size: 0.85rem; color: var(--text); line-height: 1.2;}

.horario-table .profe { font-size: 0.7rem; color: var(--text2); line-height: 1.2;}

.horario-table td.ausente {

  background: var(--rojo-bg); border: 1px solid var(--rojo); 

  box-shadow: inset 0 0 10px rgba(239,68,68,0.2);

}

.horario-table td.ausente .materia { color: var(--rojo); text-shadow: 0 0 10px rgba(239,68,68,0.4); }



/* MODAL */

.modal-overlay{

  display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);

  z-index:200;align-items:center;justify-content:center;

  backdrop-filter:blur(8px);

  -webkit-backdrop-filter:blur(8px);

  opacity:0; transition:opacity 0.3s;

}

.modal-overlay.open{display:flex;opacity:1;}

.modal{

  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius-lg);

  padding:2.5rem;width:580px;max-width:95vw;max-height:90vh;overflow-y:auto;

  box-shadow:0 25px 50px -12px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.05);

  transform:scale(0.95) translateY(20px);

  transition:all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

}

.modal-overlay.open .modal{

  transform:scale(1) translateY(0);

}

.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem}

.modal-title{font-size:1.3rem;font-weight:700}

.modal-close{

  background:var(--bg3);border:1px solid var(--border);color:var(--text2);font-size:1.2rem;

  cursor:pointer;padding:0.3rem 0.6rem;border-radius:8px;transition:all 0.2s;

}

.modal-close:hover{color:var(--rojo);background:var(--rojo-bg);border-color:var(--rojo-border)}

.form-group{margin-bottom:1.5rem}

.form-label{font-size:0.82rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.6rem;display:block}

.form-input,.form-select,.form-textarea{

  width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);

  padding:0.8rem 1rem;font-family:var(--font-text);font-size:0.95rem;color:var(--text);

  outline:none;transition:all 0.3s;

}

.form-input:focus,.form-select:focus,.form-textarea:focus{

  border-color:var(--verde);

  box-shadow: 0 0 0 3px rgba(16,185,129,0.15);

}

.form-textarea{resize:vertical;min-height:100px}

.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1.5rem}

.form-actions{display:flex;gap:1rem;justify-content:flex-end;margin-top:2rem}



.upload-area{

  border:2px díashed var(--border2);border-radius:var(--radius);

  padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;

  background:rgba(255,255,255,0.02);

}

.upload-area:hover{border-color:var(--verde);background:var(--verde-bg);transform:translateY(-2px)}

.upload-area p{font-size:0.9rem;color:var(--text2);margin-top:0.8rem}

.upload-area input{display:none}

.upload-icon{font-size:2.2rem; text-shadow:0 0 15px rgba(255,255,255,0.2);}



/* HORARIO */

.horario-grid{

  display:grid;

  grid-template-columns:80px repeat(6,1fr);

  gap:1px;background:var(--border);

  border-radius:var(--radius-lg);overflow:hidden;border:1px solid var(--border2);

  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);

}

.hora-cell,.dia-header,.clase-cell,.libre-cell{

  background:var(--bg2);padding:0.8rem 0.6rem;font-size:0.82rem;

  backdrop-filter:blur(5px);

}

.dia-header{background:rgba(255,255,255,0.05);font-weight:700;text-align:center;color:var(--text2);text-transform:uppercase;letter-spacing:1px;font-size:0.75rem}

.hora-cell{font-family:var(--mono);font-size:0.75rem;color:var(--text3);text-align:center;display:flex;align-items:center;justify-content:center}

.clase-cell{cursor:pointer;transition:all 0.2s;position:relative}

.clase-cell:hover{background:var(--bg4); transform:scale(1.02); z-index:2; box-shadow:0 10px 20px -10px rgba(0,0,0,0.8), inset 0 1px 1px rgba(255,255,255,0.1); border-radius:6px; margin:-1px}

.clase-nombre{font-weight:600;font-size:0.85rem;color:var(--text)}

.clase-curso{font-size:0.72rem;color:var(--text2);margin-top:4px}

.clase-ausente{background:var(--rojo-bg)!important;border-left:3px solid var(--rojo);}

.clase-ausente .clase-nombre{color:var(--rojo); text-shadow:0 0 10px rgba(239,68,68,0.3)}

.libre-cell{background:transparent;color:var(--text3);font-size:0.75rem;text-align:center;display:flex;align-items:center;justify-content:center}



/* ALERTAS */

.alert{

  border-radius:var(--radius);padding:1rem 1.25rem;margin-bottom:1.5rem;

  display:flex;align-items:flex-start;gap:0.8rem;font-size:0.92rem;

  border-left: 4px solid;

}

.alert-info{background:var(--azul-bg);border-left-color:var(--azul);color:var(--text);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}

.alert-warn{background:var(--amarillo-bg);border-left-color:var(--amarillo);color:var(--text);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}

.alert-danger{background:var(--rojo-bg);border-left-color:var(--rojo);color:var(--text);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}



/* TIMELINE */

.timeline{display:flex;flex-direction:column;gap:0}

.tl-item{display:flex;gap:1.2rem;padding:1.2rem 1.5rem;border-bottom:1px solid var(--border); transition:background 0.2s}

.tl-item:hover{background:rgba(255,255,255,0.02)}

.tl-item:last-child{border-bottom:none}

.tl-dot{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.1rem; box-shadow:0 0 15px currentColor}

.tl-dot-rojo{background:var(--rojo-bg);border:1px solid var(--rojo-border);color:var(--rojo)}

.tl-dot-verde{background:var(--verde-bg);border:1px solid var(--verde-border);color:var(--verde)}

.tl-dot-amarillo{background:var(--amarillo-bg);border:1px solid var(--amarillo-border);color:var(--amarillo)}

.tl-body{flex:1}

.tl-title{font-weight:600;font-size:0.95rem;display:flex;align-items:center;justify-content:space-between}

.tl-meta{font-size:0.82rem;color:var(--text2);margin-top:4px}

.tl-badge{float:right}



/* ALUMNO VISTA */

.curso-select-row{display:flex;gap:1rem;margin-bottom:1.5rem;flex-wrap:wrap}

.day-card{

  background:var(--bg2);

  backdrop-filter:blur(15px);

  border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1.5rem;overflow:hidden;

  box-shadow: inset 0 1px 1px rgba(255,255,255,0.05);

  transition:transform 0.2s;

}

.day-card:hover{transform:translateY(-2px); border-color:var(--border2)}

.day-header{padding:1rem 1.5rem;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}

.day-name{font-family:var(--font-title);font-weight:700;font-size:1.05rem}

.day-items{padding:0.5rem 0}

.day-item{display:flex;align-items:center;gap:1.2rem;padding:0.8rem 1.5rem;border-bottom:1px solid var(--border);font-size:0.92rem; transition:background 0.2s}

.day-item:hover{background:rgba(255,255,255,0.02)}

.day-item:last-child{border-bottom:none}

.day-item.ausente{background:var(--rojo-bg);border-left:3px solid var(--rojo)}

.hora-tag{font-family:var(--mono);font-size:0.8rem;color:var(--text2);width:90px;flex-shrink:0}

.materia-tag{flex:1;font-weight:600}

.profe-tag{font-size:0.82rem;color:var(--text2)}



/* RESPONSIVE */

@media(max-width:768px){

  .sidebar{position:fixed; left:-100%; z-index:100; transition:left 0.3s;}

  .stats-row{grid-template-columns:1fr 1fr}

  .form-row{grid-template-columns:1fr}

  .content{padding:1.5rem}

  .horario-grid{grid-template-columns:60px repeat(5,1fr)}

  .search-input{width:180px;}

  .search-input:focus{width:200px;}

}

</style>

<body>



<!-- LOGIN -->

<div id="login-screen">

  <div class="login-box">

    <div class="login-logo">Aula<span>Info</span></div>

    <div class="login-sub">Sistema de registro de ausencias · Instituto San Martín</div>

    <div class="role-grid">

      <div class="role-btn active" onclick="selectRole('directivo',this)">

      </div>

      </div>

      </div>

<!-- APP -->

<!-- MODAL NUEVA AUSENCIA (Profesor) -->

<div class="modal-overlay" id="modal-ausencia">

  <div class="modal">

    <div class="modal-header">

      <div class="modal-title">Registrar ausencia / licencia</div>

      <button class="modal-close" onclick="closeModal('modal-ausencia')">✕</button>

    </div>

    <div class="form-group">

      <label class="form-label">Tipo</label>

      <select class="form-select" id="tipo-ausencia">

        <option value="ausencia">Ausencia del día</option>

        <option value="licencia-medica">Licencia médica</option>

        <option value="licencia-personal">Licencia personal</option>

        <option value="capacitacion">Capacitación / Jornada</option>

        <option value="otro">Otro</option>

      </select>

    </div>

    <div class="form-row">

      <div class="form-group">

        <label class="form-label">Fecha inicio</label>

        <input class="form-input" type="date" id="fecha-inicio">

      </div>

      <div class="form-group">

        <label class="form-label">Fecha fin</label>

        <input class="form-input" type="date" id="fecha-fin">

      </div>

    </div>

    <div class="form-group">

      <label class="form-label">Materias y cursos afectados</label>

      <div id="materias-check" style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:0.8rem"></div>

    </div>

    <div class="form-group">

      <label class="form-label">Descripción / Motivo</label>

      <textarea class="form-textarea" id="motivo-texto" placeholder="Describí brevemente el motivo..."></textarea>

    </div>

      <label class="form-label">Certificado o justificación (opcional)</label>

        <div class="upload-icon">📎</div>

        <p>Hacé clic para adjuntar o arrastrá el archivo aquí</p>

        <p style="font-size:0.75rem;color:var(--text3);margin-top:0.2rem">PDF, JPG, PNG — máx. 5MB</p>

        <input type="file" id="file-cert" accept=".pdf,.jpg,.jpeg,.png" onchange="showFileName(this)">

      </label>

      <div id="file-name" style="font-size:0.8rem;color:var(--verde);margin-top:0.4rem;display:none"></div>

    </div>

    <div class="form-actions">

      <button class="btn btn-outline" onclick="closeModal('modal-ausencia')">Cancelar</button>

      <button class="btn btn-primary" onclick="submitAusencia()">Registrar ausencia</button>

    </div>

  </div>

</div>



<!-- MODAL DETALLE AUSENCIA -->

<div class="modal-overlay" id="modal-detalle">

  <div class="modal">

    <div class="modal-header">

      <div class="modal-title">Detalle de ausencia</div>

      <button class="modal-close" onclick="closeModal('modal-detalle')">✕</button>

    </div>

    <div id="detalle-content"></div>

    <div class="form-actions" id="detalle-actions"></div>

  </div>

</div>



<script>

//                 DATOS                

const CURSOS = ['1°A','1°B','2°A','2°B','3°A','3°B','4°A','4°B','5°A','5°B','6°A','6°B'];

const DIAS = ['Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];

const HORAS = ['07:30','08:20','09:10','10:00','10:50','11:40','12:30','13:20','14:10','15:00'];



const PROFESORES = [

  {id:1,nombre:'Ana García',materias:[{m:'Matemáticas',cursos:['3°A','3°B','4°A']},{m:'Álgebra',cursos:['5°A']}]},

  {id:2,nombre:'Carlos Pérez',materias:[{m:'Historia',cursos:['1°A','1°B','2°A']},{m:'Geografía',cursos:['2°B']}]},

  {id:3,nombre:'Lucía Martínez',materias:[{m:'Lengua',cursos:['3°A','4°B','5°A']},{m:'Literatura',cursos:['6°A']}]},

  {id:4,nombre:'Miguel Torres',materias:[{m:'Física',cursos:['4°A','4°B','5°B']},{m:'Química',cursos:['5°A','5°B']}]},

  {id:5,nombre:'Sofía Rodríguez',materias:[{m:'Inglés',cursos:['1°A','2°A','3°A','4°A']}]},

  {id:6,nombre:'Diego López',materias:[{m:'Ed. Física',cursos:['1°A','1°B','2°A','2°B']}]},

];



let AUSENCIAS = [

  {id:1,profId:1,profNombre:'Ana García',tipo:'licencia-medica',inicio:'2025-04-07',fin:'2025-04-09',materias:['Matemáticas — 3°A','Matemáticas — 3°B'],motivo:'Cirugía programada. Con certificado médico.',cert:true,estado:'aprobada',fechaReg:'2025-04-06'},

  {id:2,profId:2,profNombre:'Carlos Pérez',tipo:'ausencia',inicio:'2025-04-08',fin:'2025-04-08',materias:['Historia — 1°A','Historia — 1°B'],motivo:'Problema personal imprevisto.',cert:false,estado:'pendiente',fechaReg:'2025-04-08'},

  {id:3,profId:4,profNombre:'Miguel Torres',tipo:'capacitacion',inicio:'2025-04-10',fin:'2025-04-10',materias:['Física — 4°A'],motivo:'Jornada de actualización docente organizada por el Ministerio.',cert:true,estado:'aprobada',fechaReg:'2025-04-05'},

  {id:4,profId:3,profNombre:'Lucía Martínez',tipo:'licencia-personal',inicio:'2025-04-14',fin:'2025-04-14',materias:['Lengua — 3°A','Literatura — 6°A'],motivo:'Trámite personal.',cert:false,estado:'pendiente',fechaReg:'2025-04-07'},

  {id:5,profId:5,profNombre:'Sofía Rodríguez',tipo:'ausencia',inicio:'2025-04-03',fin:'2025-04-03',materias:['Inglés — 2°A'],motivo:'Gripe.',cert:true,estado:'rechazada',fechaReg:'2025-04-03'},

];



let currentRole = 'directivo';

let currentUser = 'Dir. Ramírez';

let nextId = 6;



//                 LOGIN                

function selectRole(role, el){

  currentRole = role;

  document.querySelectorAll('.role-btn').forEach(b=>b.classList.remove('active'));

  el.classList.add('active');

  const names = {directivo:'directivo@institutosm.edu.ar',preceptor:'preceptor@institutosm.edu.ar',profesor:'profe.garcia@institutosm.edu.ar',alumno:'alumno@institutosm.edu.ar'};

  document.getElementById('login-user').value = names[role];

}



function doLogin(){

  const names = {directivo:'Dir. Ramírez',preceptor:'Prec. Flores',profesor:'Prof. Ana García',alumno:'Alumno: Tomás Vega (3°A)'};

  currentUser = names[currentRole];

  document.getElementById('login-screen').style.display='none';

  document.getElementById('app').style.display='flex';

  document.getElementById('topbar-user').textContent = currentUser;

  const b = document.getElementById('topbar-badge');

  const labels = {directivo:'Directivo',preceptor:'Preceptor',profesor:'Profesor',alumno:'Alumno'};

  const classes = {directivo:'badge-directivo',preceptor:'badge-preceptor',profesor:'badge-profesor',alumno:'badge-alumno'};

  b.textContent = labels[currentRole];

  b.className = 'role-badge '+classes[currentRole];

  buildNav();

  showPage('dashboard');

}



function logout(){

  document.getElementById('login-screen').style.display='flex';

  document.getElementById('app').style.display='none';

}



//                 NAV                

function buildNav(){

  const sidebar = document.getElementById('sidebar');

  const navs = {

    directivo:[

      {id:'dashboard',icon:'📊',label:'Panel general'},

      {id:'ausencias',icon:'📋',label:'Todas las ausencias'},

      {id:'horarios',icon:'🗓️',label:'Horario semanal'},

      {section:'Gestáión'},

      {id:'profesores',icon:'👨‍🏫',label:'Profesores'},

      {id:'reportes',icon:'📈',label:'Reportes'},

    ],

    preceptor:[

      {id:'dashboard',icon:'📊',label:'Panel'},

      {id:'ausencias',icon:'📋',label:'Ausencias'},

      {id:'horarios',icon:'🗓️',label:'Horario semanal'},

      {id:'profesores',icon:'👨‍🏫',label:'Profesores'},

    ],

    profesor:[

      {id:'dashboard',icon:'📊',label:'Mi panel'},

      {id:'mis-ausencias',icon:'📋',label:'Mis ausencias'},

      {id:'mi-horario',icon:'🗓️',label:'Mi horario'},

    ],

    alumno:[

      {id:'vista-alumno',icon:'📍',label:'Ausencias hoy'},

      {id:'semana-alumno',icon:'🗓️',label:'Esta semana'},

    ],

  };

  const items = navs[currentRole];

  sidebar.innerHTML = items.map(i=>{

    if(i.section) return `<div class="nav-section">${i.section}</div>`;

    return `<div class="nav-item" id="nav-${i.id}" onclick="showPage('${i.id}')"><span class="nav-icon">${i.icon}</span>${i.label}</div>`;

  }).join('');

}



function showPage(id){

  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));

  const nav = document.getElementById('nav-'+id);

  if(nav) nav.classList.add('active');

  const area = document.getElementById('content-area');

  const renders = {

    dashboard: renderDashboard,

    ausencias: renderAusencias,

    horarios: renderHorarios,

    profesores: renderProfesores,

    reportes: renderReportes,

    'mis-ausencias': renderMisAusencias,
    'mi-horario': renderMiHorario,
    'vista-alumno': renderVistaAlumno,
    'semana-alumno': renderSemanaAlumno,
  };

  if(renders[id]) area.innerHTML = `<div class="page active">${renders[id]()}</div>`;
}

function renderDashboard(){
  const hoy = new Date().toISOString().split('T')[0];
  const ausHoy = AUSENCIAS.filter(a=>a.inicio<=hoy&&a.fin>=hoy&&a.estado==='aprobada');
  const pendientes = AUSENCIAS.filter(a=>a.estado==='pendiente');
  const aprob = AUSENCIAS.filter(a=>a.estado==='aprobada');
  const conCert = AUSENCIAS.filter(a=>a.cert).length;

  if(currentRole==='profesor'){
    const mis = AUSENCIAS.filter(a=>a.profId===1);
    const misPend = mis.filter(a=>a.estado==='pendiente');
    return `
      <div class="page-title">Mi panel</div>
      <div class="page-sub">Prof. Ana García · Matemáticas, Álgebra</div>
      <div class="stats-row" style="grid-template-columns:repeat(3,1fr)">
        <div class="stat-card"><div class="stat-num" style="color:var(--amarillo)">${misPend.length}</div><div class="stat-label">Ausencias pendientes</div></div>
        <div class="stat-card"><div class="stat-num" style="color:var(--verde)">${mis.filter(a=>a.estado==='aprobada').length}</div><div class="stat-label">Aprobadas</div></div>
        <div class="stat-card"><div class="stat-num">${mis.length}</div><div class="stat-label">Total registradas</div></div>
      </div>
      <div class="alert alert-info">ℹ️  Recordá adjuntar el certificado médico dentro de las 48hs de tu ausencia.</div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem">
        <div style="font-weight:600;font-size:0.95rem">Mis últimas ausencias</div>
        <button class="btn btn-primary" onclick="openModalAusencia()">+ Nueva ausencia</button>
      </div>
      ${renderTablaAusencias(mis.slice(-3),'profesor')}`;
  }

  return `
  <div class="page-title">Panel general</div>

  <div class="page-sub">Resumen del día — ${new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'})}</div>

  <div class="stats-row">

    <div class="stat-card"><div class="stat-num" style="color:var(--rojo)">${ausHoy.length}</div><div class="stat-label">Ausentes hoy</div><div class="stat-change stat-up">↑ vs ayer</div></div>

    <div class="stat-card"><div class="stat-num" style="color:var(--amarillo)">${pendientes.length}</div><div class="stat-label">Sin aprobar</div><div class="stat-change" style="color:var(--text2)">requieren revisión</div></div>

    <div class="stat-card"><div class="stat-num" style="color:var(--verde)">${aprob.length}</div><div class="stat-label">Aprobadas</div></div>

    <div class="stat-card"><div class="stat-num">${conCert}</div><div class="stat-label">Con certificado</div></div>

  </div>

  ${pendientes.length>0?`<div class="alert alert-warn">⚠️ Hay ${pendientes.length} ausencia${pendientes.length>1?'s':''} pendiente${pendientes.length>1?'s':''} de revisión.</div>`:''}

  <div style="display:grid;grid-template-columns:1.4fr 1fr;gap:1.5rem;margin-top:0.5rem">

    <div>

      <div class="card">

        <div class="card-header"><span class="card-title">Ausencias de hoy</span><span class="chip chip-rojo">${ausHoy.length} prof.</span></div>

        <div class="timeline">

          ${ausHoy.length===0?`<div style="padding:1.5rem;text-align:center;color:var(--text2);font-size:0.85rem">✅ Sin ausencias registradas para hoy</div>`:

          ausHoy.map(a=>`

          <div class="tl-item" onclick="openDetalle(${a.id})" style="cursor:pointer">

            <div class="tl-dot ${a.tipo==='licencia-medica'?'tl-dot-rojo':a.tipo==='capacitacion'?'tl-dot-verde':'tl-dot-amarillo'}">${a.tipo==='licencia-medica'?'ðŸ¥':a.tipo==='capacitacion'?'📚':'ðŸš«'}</div>

            <div class="tl-body">

              <div class="tl-title">${a.profNombre} <span class="tl-badge">${chipEstado(a.estado)}</span></div>

              <div class="tl-meta">${a.materias.join(' · ')} &nbsp;·&nbsp; ${tipoLabel(a.tipo)}</div>

            </div>

          </div>`).join('')}

        </div>

      </div>

    </div>

    <div>

      <div class="card">

        <div class="card-header"><span class="card-title">Próximas ausencias</span></div>

        <div class="timeline">

          ${AUSENCIAS.filter(a=>a.inicio>new Date().toISOString().split('T')[0]).slice(0,4).map(a=>`

          <div class="tl-item" onclick="openDetalle(${a.id})" style="cursor:pointer">

            <div class="tl-dot tl-dot-amarillo">ðŸ“…</div>

            <div class="tl-body">

              <div class="tl-title">${a.profNombre}</div>

              <div class="tl-meta">${formatFecha(a.inicio)}${a.fin!==a.inicio?' → '+formatFecha(a.fin):''}</div>

            </div>

          </div>`).join('')}

        </div>

      </div>

    </div>

  </div>`;

}



//                 AUSENCIAS                

function renderAusencias(){

  return `

  <div class="page-title">Registro de ausencias</div>

  <div class="page-sub">Historial completo de ausencias y licencias</div>

  <div class="card">

    <div class="card-header">

      <span class="card-title">Todas las ausencias</span>

      <div class="card-actions">

        <input class="search-input" placeholder="Buscar profesor..." oninput="filterTable(this.value)" id="search-aus">

        <select class="filter-select" onchange="filterEstado(this.value)">

          <option value="">Todos los estados</option>

          <option value="pendiente">Pendientes</option>

          <option value="aprobada">Aprobadas</option>

          <option value="rechazada">Rechazadas</option>

        </select>

        <select class="filter-select" onchange="filterTipo(this.value)">

          <option value="">Todos los tipos</option>

          <option value="ausencia">Ausencia</option>

          <option value="licencia-medica">Lic. médica</option>

          <option value="licencia-personal">Lic. personal</option>

          <option value="capacitacion">Capacitación</option>

        </select>

      </div>

    </div>

    ${renderTablaAusencias(AUSENCIAS,'admin')}

  </div>`;

}



function renderTablaAusencias(lista, modo){

  return `<div style="overflow-x:auto"><table id="tabla-ausencias">

    <thead><tr>

      <th>Profesor</th><th>Tipo</th><th>Período</th><th>Materias</th><th>Certificado</th><th>Estado</th><th>Acciones</th>

    </tr></thead>

    <tbody>

    ${lista.map(a=>`<tr data-nombre="${a.profNombre.toLowerCase()}" data-estado="${a.estado}" data-tipo="${a.tipo}">

      <td><strong>${a.profNombre}</strong></td>

      <td>${chipTipo(a.tipo)}</td>

      <td style="font-family:var(--mono);font-size:0.8rem;white-space:nowrap">${formatFecha(a.inicio)}${a.fin!==a.inicio?'<br>→ '+formatFecha(a.fin):''}</td>

      <td style="font-size:0.8rem;color:var(--text2);max-width:180px">${a.materias.join('<br>')}</td>

      <td style="text-align:center">${a.cert?'<span class="chip chip-verde">✓ Adj.</span>':'<span class="chip chip-gris">Sin cert.</span>'}</td>

      <td>${chipEstado(a.estado)}</td>

      <td>

        <div style="display:flex;gap:0.4rem">

          <button class="btn btn-outline btn-sm" onclick="openDetalle(${a.id})">Ver</button>

          ${(modo==='admin'||modo==='preceptor') && a.estado==='pendiente'?`

    inicio:document.getElementById('fecha-inicio').value,

    fin:document.getElementById('fecha-fin').value,

    materias:materias.length>0?materias:['Sin especificar'],

    motivo:document.getElementById('motivo-texto').value||'Sin motivo especificado.',

    cert:cert,

    estado:'pendiente',

    fechaReg:new Date().toISOString().split('T')[0],

  };

  AUSENCIAS.unshift(nueva);

  closeModal('modal-ausencia');

  showPage('mis-ausencias');

}



function showFileName(input){

  const div = document.getElementById('file-name');

  if(input.files.length>0){div.style.display='block';div.textContent='📎 '+input.files[0].name;}

  else{div.style.display='none';}

}



//                 DETALLE                

function openDetalle(id){

  const a = AUSENCIAS.find(x=>x.id===id);

  if(!a) return;

  document.getElementById('detalle-content').innerHTML=`

    <table style="width:100%;font-size:0.9rem"><tbody>

      <tr><td style="color:var(--text2);padding:0.5rem 0;width:130px">Profesor</td><td><strong>${a.profNombre}</strong></td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Tipo</td><td>${chipTipo(a.tipo)}</td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Período</td><td style="font-family:var(--mono)">${formatFecha(a.inicio)}${a.fin!==a.inicio?' → '+formatFecha(a.fin):''}</td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Materias</td><td>${a.materias.join('<br>')}</td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Motivo</td><td>${a.motivo}</td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Certificado</td><td>${a.cert?'<span class="chip chip-verde">✓ Adjunto</span>':'<span class="chip chip-gris">No adjuntó</span>'}</td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Estado</td><td>${chipEstado(a.estado)}</td></tr>

      <tr><td style="color:var(--text2);padding:0.5rem 0">Registrada</td><td>${formatFecha(a.fechaReg)}</td></tr>

    </tbody></table>`;

  const acts = document.getElementById('detalle-actions');

  acts.innerHTML=`<button class="btn btn-outline" onclick="closeModal('modal-detalle')">Cerrar</button>

    ${(currentRole==='directivo'||currentRole==='preceptor')&&a.estado==='pendiente'?`

    <button class="btn btn-danger" onclick="rechazar(${a.id});closeModal('modal-detalle');showPage('ausencias')">Rechazar</button>

    <button class="btn btn-primary" onclick="aprobar(${a.id});closeModal('modal-detalle');showPage('ausencias')">Aprobar</button>`:''}`;

  document.getElementById('modal-detalle').classList.add('open');

}



function closeModal(id){document.getElementById(id).classList.remove('open')}



//                 HELPERS                

function formatFecha(f){

  if(!f) return '';

  const [y,m,d]=f.split('-');

  const meses=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

  return `${parseInt(d)} ${meses[parseInt(m)-1]} ${y}`;

}

function tipoLabel(t){

  const labels={ausencia:'Ausencia',['licencia-medica']:'Lic. médica',['licencia-personal']:'Lic. personal',capacitacion:'Capacitación',otro:'Otro'};

  return labels[t]||t;

}

function chipTipo(t){

  const map={ausencia:'chip-rojo',['licencia-medica']:'chip-rojo',['licencia-personal']:'chip-amarillo',capacitacion:'chip-azul',otro:'chip-gris'};

  return `<span class="chip ${map[t]||'chip-gris'}">${tipoLabel(t)}</span>`;

}

function chipEstado(e){

  const map={pendiente:'chip-amarillo',aprobada:'chip-verde',rechazada:'chip-rojo'};

  const labels={pendiente:'Pendiente',aprobada:'Aprobada',rechazada:'Rechazada'};

  return `<span class="chip ${map[e]||'chip-gris'}">${labels[e]||e}</span>`;

}



// Cerrar modales al click fuera

document.querySelectorAll('.modal-overlay').forEach(m=>{

  m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');});

});



// Init fecha hoy

const hoyFecha = new Date().toISOString().split('T')[0];

document.getElementById('fecha-inicio')&&(document.getElementById('fecha-inicio').value=hoyFecha);

document.getElementById('fecha-fin')&&(document.getElementById('fecha-fin').value=hoyFecha);



// SEGUIMIENTO DEL SENSOR (MOUSE/TOUCH) PARA EL FONDO INTERACTIVO

function updateMousePosition(x, y) {

  document.documentElement.style.setProperty('--mouse-x', x + 'px');

  document.documentElement.style.setProperty('--mouse-y', y + 'px');

}



// Mouse para web

document.addEventListener('mousemove', (e) => {

  updateMousePosition(e.clientX, e.clientY);

});



// Touch para celulares

document.addEventListener('touchmove', (e) => {

  if (e.touches.length > 0) {

    updateMousePosition(e.touches[0].clientX, e.touches[0].clientY);

  }

});

</script>
